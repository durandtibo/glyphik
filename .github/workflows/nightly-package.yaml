name: Nightly Package Tests
on:
  schedule:
    - cron: '30 10 * * *' # run at 10:30 AM UTC
  workflow_dispatch:  # to trigger manually

permissions:
  contents: read

jobs:
  get-versions:
    uses: ./.github/workflows/get-versions.yaml

  stable:
    uses: ./.github/workflows/test-package.yaml
    with:
      install-cmd: 'uv pip install glyphik'

  stable-all:
    uses: ./.github/workflows/test-package.yaml
    with:
      install-cmd: 'uv pip install "glyphik[all]"'

  stable-extras:
    uses: ./.github/workflows/test-package-extras.yaml

  latest:
    uses: ./.github/workflows/test-package.yaml
    with:
      install-cmd: 'uv pip install --pre glyphik'

  latest-all:
    uses: ./.github/workflows/test-package.yaml
    with:
      install-cmd: 'uv pip install --pre "glyphik[all]"'

  latest-extras:
    uses: ./.github/workflows/test-package-extras.yaml
    with:
      install-args: '--pre'


  ########################
  #     Dependencies     #
  ########################

  coola:
    needs: get-versions
    uses: ./.github/workflows/test-package-dep.yaml
    with:
      package-name: coola
      package-versions: ${{ toJson(fromJson(needs.get-versions.outputs.package_versions).coola) }}

  iden:
    needs: get-versions
    uses: ./.github/workflows/test-package-dep.yaml
    with:
      package-name: iden
      package-versions: ${{ toJson(fromJson(needs.get-versions.outputs.package_versions).iden) }}

  langchain-core:
    needs: get-versions
    uses: ./.github/workflows/test-package-dep.yaml
    with:
      package-name: langchain-core
      package-versions: ${{ toJson(fromJson(needs.get-versions.outputs.package_versions)['langchain-core']) }}

  langchain:
    needs: get-versions
    uses: ./.github/workflows/test-package-dep.yaml
    with:
      package-name: langchain
      package-versions: ${{ toJson(fromJson(needs.get-versions.outputs.package_versions).langchain) }}

  langgraph:
    needs: get-versions
    uses: ./.github/workflows/test-package-dep.yaml
    with:
      package-name: langgraph
      package-versions: ${{ toJson(fromJson(needs.get-versions.outputs.package_versions).langgraph) }}

  rich:
    needs: get-versions
    uses: ./.github/workflows/test-package-dep.yaml
    with:
      package-name: rich
      package-versions: ${{ toJson(fromJson(needs.get-versions.outputs.package_versions).rich) }}

  zenpyre:
    needs: get-versions
    uses: ./.github/workflows/test-package-dep.yaml
    with:
      package-name: zenpyre
      package-versions: ${{ toJson(fromJson(needs.get-versions.outputs.package_versions).zenpyre) }}


  #################################
  #     Optional dependencies     #
  #################################
